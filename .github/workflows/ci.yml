# ---------------------------------------------------------------------------
# CI — SB-Optima Backend & Frontend
# ---------------------------------------------------------------------------
# Runs on every push to main and on pull requests.
# Two parallel jobs: backend (Python) and frontend (Node.js).
# ---------------------------------------------------------------------------

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Backend (Python) ----
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx fastapi fpdf2

      - name: Run tests
        run: python -m pytest tests/ -v

  # ---- Frontend (Node.js) ----
  frontend:
    name: Frontend Lint / Build / Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Test
        working-directory: frontend
        run: npm test
