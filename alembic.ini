# Alembic configuration for SB-Optima
# ---------------------------------------------------------------------------
# The actual database URL is read from the DATABASE_URL environment variable
# inside env.py, so the value below is only a placeholder.
# ---------------------------------------------------------------------------

[alembic]
script_location = alembic
prepend_sys_path = .
# sqlalchemy.url is intentionally left blank — env.py reads DATABASE_URL.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
