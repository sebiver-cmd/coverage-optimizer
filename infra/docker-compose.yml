# ---------------------------------------------------------------------------
# Docker Compose — SB-Optima local development
# ---------------------------------------------------------------------------
# Usage:
#   docker compose -f infra/docker-compose.yml up --build
# ---------------------------------------------------------------------------

services:
  # ---- FastAPI backend ----
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - path: ../.env
        required: false
    environment:
      # Defaults — .env file values take precedence
      - SB_OPTIMA_ENABLE_APPLY=false
      - DATABASE_URL=postgresql+psycopg2://sboptima:sboptima@postgres:5432/sboptima
      - REDIS_URL=redis://redis:6379/0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      # Allow time for Alembic migrations + uvicorn startup before
      # the first health probe fires.
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---- Arq background worker ----
  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    command: ["arq", "backend.worker.WorkerSettings"]
    env_file:
      - path: ../.env
        required: false
    environment:
      - DATABASE_URL=postgresql+psycopg2://sboptima:sboptima@postgres:5432/sboptima
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---- Next.js frontend ----
  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
      args:
        # Baked into the client bundle at build time (NEXT_PUBLIC_* vars).
        # Override by setting NEXT_PUBLIC_API_URL in the host environment or .env.
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-https://api.sboptima.dk}"
    ports:
      - "3000:3000"
    environment:
      # Also set at runtime for SSR usage; mirrors the build arg above.
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.sboptima.dk}
    depends_on:
      api:
        condition: service_healthy

  # ---- Postgres 16 ----
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sboptima}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sboptima}
      POSTGRES_DB: ${POSTGRES_DB:-sboptima}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sboptima}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- Redis 7 ----
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- Caddy reverse proxy (automatic HTTPS, production only) ----
  # Uncomment the caddy service below when deploying to production.
  # caddy:
  #   image: caddy:2
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   depends_on:
  #     - api
  #     - frontend

volumes:
  pgdata:
  redisdata:
  # Uncomment for production Caddy deployment:
  # caddy_data:
  # caddy_config:
